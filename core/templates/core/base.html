<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foresight — {% block title %}Dashboard{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --navy:  #1B2A4A;
      --gold:  #C9A84C;
      --light: #F4F6FA;
    }

    body {
      background: var(--light);
      font-family: 'Segoe UI', sans-serif;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px;
      min-height: 100vh;
      background: var(--navy);
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
      padding-top: 1rem;
    }

    .sidebar-brand {
      color: var(--gold);
      font-size: 1.5rem;
      font-weight: 700;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 1rem;
    }

    .sidebar-brand span {
      color: white;
      font-size: 0.75rem;
      display: block;
      font-weight: 400;
    }

    .sidebar .nav-link {
      color: rgba(255,255,255,0.7);
      padding: 0.75rem 1.5rem;
      border-radius: 0;
      transition: all 0.2s;
      font-size: 0.9rem;
    }

    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
      color: white;
      background: rgba(201,168,76,0.15);
      border-left: 3px solid var(--gold);
    }

    .sidebar .nav-link i {
      margin-right: 0.6rem;
      width: 18px;
    }

    /* ── MAIN CONTENT ── */
    .main-content {
      margin-left: 240px;
      padding: 2rem;
      min-height: 100vh;
    }

    /* ── CARDS ── */
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: none;
      transition: transform 0.2s;
    }

    .stat-card:hover { transform: translateY(-2px); }

    .stat-card .stat-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .stat-card .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--navy);
    }

    .stat-card .stat-label {
      font-size: 0.8rem;
      color: #64748B;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── CHART CARDS ── */
    .chart-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .chart-card h6 {
      color: var(--navy);
      font-weight: 600;
      margin-bottom: 1rem;
    }

    /* ── ALERTS ── */
    .alert-danger-custom {
      background: #FEF2F2;
      border-left: 4px solid #EF4444;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
    }

    .alert-warning-custom {
      background: #FFFBEB;
      border-left: 4px solid #F59E0B;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      margin-bottom: 1.5rem;
    }

    .page-header h4 {
      color: var(--navy);
      font-weight: 700;
      margin: 0;
    }

    .page-header p {
      color: #64748B;
      font-size: 0.875rem;
      margin: 0;
    }

    /* ── TABLE ── */
    .table-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .badge-category {
      background: rgba(27,42,74,0.1);
      color: var(--navy);
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .badge-danger  { background: #FEE2E2; color: #DC2626; }
    .badge-warning { background: #FEF3C7; color: #D97706; }
    .badge-success { background: #DCFCE7; color: #16A34A; }
  </style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<div class="sidebar">
  <div class="sidebar-brand">
    ⚡ Foresight
    <span>AI Finance Tracker</span>
  </div>
  <nav class="nav flex-column">
    <a href="{% url 'dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a href="{% url 'expenses' %}" class="nav-link {% if request.resolver_match.url_name == 'expenses' %}active{% endif %}">
      <i class="bi bi-receipt"></i> Expenses
    </a>
    <a href="{% url 'predictions' %}" class="nav-link {% if request.resolver_match.url_name == 'predictions' %}active{% endif %}">
      <i class="bi bi-graph-up-arrow"></i> Predictions
    </a>
    <a href="{% url 'alerts' %}" class="nav-link {% if request.resolver_match.url_name == 'alerts' %}active{% endif %}">
      <i class="bi bi-bell"></i> Alerts
      {% if alert_count %}
        <span class="badge bg-danger ms-1">{{ alert_count }}</span>
      {% endif %}
    </a>
    <a href="{% url 'run_pipeline' %}" class="nav-link">
      <i class="bi bi-cpu"></i> Run ML Pipeline
    </a>
  </nav>
</div>

<!-- ── MAIN CONTENT ── -->
<div class="main-content">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
